<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<script>
    // 1. 배열 for...in (인덱스 + 값)
    let brands = ["애플","구글","아마존","마이크로소프트","메타"];

    for (const i in brands) {
        console.log(i, brands[i]);
    }

    console.log("----------------");

    // 2. 객체 출력
    let person = {
        name: "홍길동",
        age: 22,
        tel: "010-0000-0000",
        city: "Seoul"
    };

    // key만 출력
    for (const key in person) {
        console.log(key);
    }

    console.log("----------------");

    // key + value 출력
    for (const key in person) {
        console.log(key, ":", person[key]);
    }

    console.log("----------------");

    // 3. 키 입력해서 찾기 (핵심)
    let inputKey = prompt("알고 싶은 키 입력 (name, age, tel, city)");

    if (inputKey === "" || inputKey === null) {
        console.log("키 값이 없습니다");
    } else {

        let found = false;

        for (const key in person) {
            if (key === inputKey) {
                console.log(key, ":", person[key]);
                found = true;
                break;
            }
        }

        if (!found) {
            console.log("일치하지 않는 키 값");
        }
    }

    console.log("----------------");

    // 4. 다른 객체 예시
    let car = {
        brand: "현대",
        model: "소나타",
        year: 2023,
        color: "흰색"
    };

    for (const key in car) {
        console.log(key, car[key]);
    }

</script>

</body>
</html>
