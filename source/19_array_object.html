<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fafafa;
            color: #333;
            margin: 24px;
        }

        table {
            width: min(100%, 620px);
            border-collapse: collapse;
            margin: 0 auto;
            background: #ffffff;
        }

        thead th {
            background: #e2e2e2;
            color: #333;
            padding: 12px 14px;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid #d4d4d4;
            text-align: center;
        }

        tbody tr:nth-child(even) {
            background: #f7f7f7;
        }

        tbody td {
            padding: 12px 14px;
            border-bottom: 1px solid #e8e8e8;
            text-align: center;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }
    </style>
</head>

<body>
    <select id = "selDrinkType">
        <option value="coke">콜라</option>
        <option value="sprite">사이다</option>
        <option value="fanta">환타</option>
    </select>
    <button onclick="doSeach1()">조회1</button>
    <button onclick="doSeach2()">조회2</button>
    <table>
        <thead>
            <th>학번</th>
            <th>이름</th>
            <th>벌점</th>
        </thead>
        <tbody>
            <tr>
                <td>2317</td>
                <td>홍성재</td>
                <td>8</td>
            </tr>
            <tr>
                <td>2306</td>
                <td>박주혁</td>
                <td>2</td>
            </tr>
            <tr>
                <td>2305</td>
                <td>민서연</td>
                <td>1</td>
            </tr>
            <tr>
                <td>2312</td>
                <td>이담현</td>
                <td>2</td>
            </tr>

        </tbody>
    </table>
    <table>
        <thead>
            <th>음료</th>
            <th>가격</th>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <script>
        //자바스크립트에서 가장 많이 사용하며 실무에서 중요도가 높은 객체
        let brands = ["구글", "애플", "아마존", "삼성", "하이닉스", "마이크로소프트"];

        //1.toString() : 배열요소를 하나의 문자열(,)로 합치기
        console.log(brands.toString());

        //2.*****join() : 파라미터로 전달된 문자를 이용해서 하나의 문자열로 합치기 
        console.log(brands.join(""));
        console.log(brands.join("/"));

        //2-1. join()실무 활용 : db에서 데이터를 읽어와 동적으로 표를 만들어 화면에 출력 

        //+= (문자열) : 장점 : 단점 : 데이터 수가 많으면 performance 낮아짐 
        const doSeach1 = () => {
            //1. db에서 데이터 읽어오기 
            const drinkList = [
                { name: "오렌지", price: 1000 },
                { name: "파워 에이드", price: 1200 },
                { name: "커피", price: 700 },
                { name: "보리음료", price: 1200 },
                { name: "코카콜라", price: 1800 },
            ];

            let trTags = "";
            for (drink of drinkList) {
                trTags += "<tr>";
                trTags += "<td>" + drink.name + "</td>";
                trTags += "<td>" + drink.price + "</td>";
                trTags += "</tr>";

            }
            console.log(trTags);
            document.getElementById("tbody").innerHTML = trTags;
        };

        //2.데이터 갯수 만큼 렌더링해서 출력 
         const doSeach2 = () => {
            //1. db에서 데이터 읽어오기 
            const drinkList = [
                { name: "오렌지", price: 1000 },
                { name: "파워 에이드", price: 1200 },
                { name: "커피", price: 700 },
                { name: "보리음료", price: 1200 },
                { name: "코카콜라", price: 1800 },
            ];

            let trTags = [];
            for (drink of drinkList) {
                trTags.push(drink);
                
            }
            document.getElementById("tbody").innerHTML = trTags.join("");
        };

        /* join() :파라미터로 전달된 문자를 이용해서 하나의 문자열로 변환하며 실무에서 많이 사용 
        join의 활용 : 실무에서 ㅁ낳이 사용하며 많은 데이터양을 동적으로 불러올 경우 매우 효과적이다 
        태그 : table,thead,th,tbody,tr,id,button
        속성 : id(자바스크립트에 document의 위치를 알려주기),class(스타일 대상 요소를 가리킴
        이벤트 : 요소에 발생하는 동작 (button oneclick = "함수")
        이벤트핸들러 : 이벤트에 해당하는 동작을 담은 함수
        */
        //pop() : 배열의 마지막 요소 반환하고 배열에서 제거,리턴 값 : 제거 요소
         brands = ["구글", "애플", "아마존", "삼성", "하이닉스", "마이크로소프트"];
         console.log(brands.pop());
         console.log(brands);
         

        //push() : 배열의 마지막 요소 추가, join많이 사용 리턴 값 : length
        //실무에서 태그 생성 + join()
        console.log(brands.push("테슬라"));
        console.log(brands);


        //shift() : 배열의 첫 요소 반환하고 배열에서 제거, 리턴 값 : 제거 요소
        //실무 : 서버 프로그램에서 많이 사용 => 요청을 배열에 쌓아두었다가 이벤트 큐에 순서대로 정리된 목록에서 1번 요청, 
        //2번 요청 하나씩 꺼내서 작업을 처리
        console.log(brands.shift());
        console.log(brands);

        //unshift() : 배열의 첫 요소를  추가, 리턴 값 : length
        console.log(brands.unshift("쿠팡"));
        console.log(brands);

        //화면이 로드되면 db에서 데이터를 읽어와서 select에 동적으로 요소를 보여주기 
        
          const loadDrinkType = () => {
            const drinks = [
                {text : "이온음료", code : "ion"},
                {text : "카페", code : "coffee"},
                {text : "라떼", code : "late"},
            ];
       
          let tags = [];
          for(drink of drinks) {
            
            tags.push("coption value" + drink.code + ">" + drink.text | "</option>");
          } 
          //drinks.unshift({});
          return tags; //태그가 들어있는 배열 
        };
        const selDrink = loadDrinkType();
        //selDrink.unshift();
        selDrink.unshift();
        document.getElementById("selDrinkType").innerHTML = selDrink.join("");

        



    </script>
</body>

</html>
