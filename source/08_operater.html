    <script>
        //1. 할당 연산자(산술 연산자 - 이항)
        let x = 2;
        let y =3;
        x = x + y;
        console.log(y);
        console.log(x);
        x = x-y;   
        console.log(x); 
        x = x * y;
        console.log(x);
        x = x / y;
        console.log(x); 
        x = x % y;
        console.log(x); 
        x = x ** y;
        console.log(x);
        
        console.log('--------------------');
        //2. 복합 할당 연산자
        x = 3;
        y = 5;
        console.log((x += y)); // x = x+y // 8 
        x = x++
        console.log((x -= y)); // x = x-y(위에 x+y여서 x는 8로 바뀐다) // 3
        x = ++x
        console.log((x *= y)); // x = x*y // 15
        console.log((x /= y)); // x = x/y // 3
        console.log((x %= y)); // x = x%y // 3

        console.log('--------------------');

        //3. 비교 연산자 : ==, ===, !=, !==
        let a = 3;
        let b = "3";
        console.log(a == b); // true = 값만 비교 
        console.log(a === b); // false => 값과 타입 다 비교
        
        console.log('--------------------');

        //4. 산술 연산자 : 단항  ++(증가) ,--(감소) ,+(숫자화) ,- (단항부정)
        x = 5; // 6
        y = 6;
        y = ++x; //증가하고 할당 x++ 할당 하고 증가
        console.log(x); //6
        console.log(y); //6
        console.log('--------------------');


        //5. 단항부정 연산자 : 부호를 바꿔주는 역할 
        x = -3;

        console.log(-x);
        console.log('--------------------');

        //7.논리 연산자 : 여러가지 조건을 만족 시키는지 알아보는 연산자 &&(AND = 둘다 참 => 참), 
        //||(OR = 둘중 하나만 참 => 참) 
        
      
        let o = true && false;
        o = 3 > 2 && 4 > 7; //false
        o = 3 > 2 && 8 > 7; // t
        o = true || false; 
        o = 3 > 2 || 4 > 7; //t
        o = 3 > 4 || 4 < 2 || (2 > 1 && 3 > 4); // true
        console.log(o);
        console.log('--------------------');

        //8. 문자열 연산자 : + (concate)
        let firstName = "John";
        let lastName = "Bacon";
        let fullName = firstName + " " + lastName;
        console.log(fullName);

        //9조건 삼항 연산자

        let isAdult = age >= 20 ? "성인" : "미성년자";
        console.log(isAdult);
