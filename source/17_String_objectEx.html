<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
      //4. slice() 실무활용 예제
      //4-1. 긴 문자열을 일부만 잘라서 보여주고 나머지는 "..." 처리시 
      const longString = "2박3일 일정으로 중국을 방문 예정 중인 트럼프 대통령은 시진핑 주석과 만나 이란과 관련해 긴 대화를 나눌 것이지만, 도움은 필요없다고 이야기했습니다.";
      const truncateTitle = (title,maxLength) => {
        if(title.length > maxLength) {
            return title.slice(0,maxLength)+"...."
        }else {
            return title;
        }
      };
      console.log(truncateTitle(longString,15));

      //4-2 마스킹 : 개인 정보를 안 보이게 처리
      let phoneNumber = "010-1234-5678";
      let hiddenNumber = "";
      hiddenNumber = phoneNumber.slice(0,-4) + "****";
      console.log(hiddenNumber); //010-1234-****

      //7. replace() 실무활용 예제(with 정규식 (regular expression))
      //회원가입시 전번 010-1111-2222 형식으로 입력 => db에 저장시 01011112222
      /* 정규식 (regular expression) : 특정한 포맷을 만들어 내는 식
      - / / 사이에 작성 
      - D : 숫자
      - \ not
      - 옵션 : g=> 모두(all) i => 대소문자를 구분하지 않는다.  
      */
      phoneNumber = "010-1234-5678";
      const Numberreplace = (number) => {
        return number.replace(/-/g, ""); // (/\D/g,"") 숫자가 아닌거 
        }
      console.log(Numberreplace(phoneNumber));

      let str = "Welcome Jeju jeju";
      console.log(str.replace(/Jeju/gi,"Seoul"));
      
      //12. padStart() 실무 활용 예제
      //앞자리 마스킹, 카드 번호를 db에서 읽어와 뒷자리 4자리만 보여주고자 할 경우 
      const cardNumber = "7654";
      const maskCardNumber = cardNumber.padStart(16,'*');
      console.log(maskCardNumber);

      //14. charAt() 실무 활용 예제
      //주민등록 번호 뒷자리의 첫글자를 이용해 성별을 확인
      //091015-304231, 1,3(내국인,남자) 2,4(내국인,여성) 5,7(외국인,남성) 6,8(외국인,여성)
     const checkGender = (sn) => {
      let gender = "";
      let code = sn.charAt(7); 

        if (code === "1" || code === "3") {
          gender = "내국인,남자";
        } else if (code === "2" || code === "4") {
          gender = "내국인,여성";
        } else if (code === "5" || code === "7") {
          gender = "외국인,남성";
        } else if (code === "6" || code === "8") {
          gender = "외국인,여성";
        }
        return gender;
      };
      console.log(checkGender("091015-304231")); // "내국인,남자"
      console.log(checkGender("091015-404231")); // "내국인,여성"
      
      //16. split() 실무 활용 예제
      const url = "https://myshop.com/products/electronics/iphone15";
      const pageSegment = url.split("/");
      console.log(pageSegment);
      let size = pageSegment.length;
      console.log(`카테고리 : ${pageSegment[size -2 ]}`);
      console.log(`제품명 : ${pageSegment[size -1]}`);

      //******************로그 파일 내용 가져오기******************
      //접근 허용이 안 되는 사용자의 로그 기록 찾기 
      const csvData =
      "2025-04-29,Login_Success,user_01\n2024-04-29,Login_Fail,user_02";
      const logData = csvData.split("\n");

      for(line of logData) {
        [date, status, user]=line.split(","); //배열 구조 분해 할당  
        if(status === "Login_Fail") {
        console.log(`${user}가 ${date}에 로그인에 실패하였습니다 `);
        }
      }
      
      //18. endsWith() 실무 활용 예제 
      //파일 업로드시 jpg,png 만 가능 
     // 파일 업로드시 jpg, png만 가능
      const fileNameCheck = (fileName) => {
        const lowerName = fileName.toLowerCase();

        if (
          lowerName.endsWith(".jpg") ||
          lowerName.endsWith(".png")
        ) {
          return "업로드 가능";
        } else {
          return "업로드 불가능";
        }
      };

      console.log(fileNameCheck("photo.JPG"));
      console.log(fileNameCheck("image.png"));
 
    </script>
</body>
</html>
