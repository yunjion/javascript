<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <input type="date" name="" id="startDate" />
    <input type="date" name="" id="endDdate" />
    <script>
      //1. 날짜정보 얻어오기
      let now = new Date();
      console.log(now); //

      //2. 사용자가 날짜를 지정해서 날짜 객체 만들기
      //년도, 월(0부터 시작),날짜,시,분,초,밀리초
      //요일 (일요일 : 0)
      let d = new Date(2025, 4, 29, 19, 20, 0);
      console.log(d);

      //3. get() 함수 : now
      let year = now.getFullYear();
      let month = now.getMonth();
      let date = now.getDate();
      let dayName = now.getDay();
      let hour = now.getHours();
      let minuto = now.getMinutes();
      let second = now.getSeconds();
      let millisec = now.getMilliseconds();
      console.log(year, month, date, dayName, hour, minuto, second, millisec);

      //4. set() 함수 => 실무에서 거의 사용하지 않는다.

      //5. 2026-06-24
      let today =
        year.toString() +
        "-" +
        month.toString().padStart(2, "0") +
        "-" +
        date.toString().padStart(2, "0");

      // console.log(today);

      document.getElementById("endDdate").value = today;

      //****************************************************************************************
      /* 기준시 1970.1.1.0.0.0 => 밀리초로 모든 날짜를 계산하는 방식
    - 밀리초를 구하는 내장함수 : getTile();
    - 밀리초로 날짜를 구하는 내장함수 : Date(밀리초);
      */

      let stanDard = new Date(0);
      console.log(stanDard);

      let todayMillisec = now.getTime(); //현재 밀리초
      console.log(todayMillisec);

      let dayMillisec = 24 * 60 * 60 * 100; //하루 밀리초
      console.log(dayMillisec);

      let yesterDay = new Date(todayMillisec - dayMillisec);
      console.log(yesterDay);

      //6. 오늘을 기준으로 1주일 전을 id = "startDate" 에 출력해보기

      let lastWeek = new Date(todayMillisec - dayMillisec * 7);
      document.getElementById("startDdate").value = lastWeek
        .toISOString()
        .split("T")[0];
      //오늘 기준으로 며칠 전후를 구하는 함수 : getIntervalDate()

      //2학기 평가
      //중간 40% 지필
      //수행 60% 15% 기획안 45% 동료 평가
    </script>
  </body>
</html>
