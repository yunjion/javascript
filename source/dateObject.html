    <script>
      // 1. 현재 날짜 정보
      let now = new Date();
      console.log(now);

      // 2. 사용자가 날짜를 지정해서 날짜 객체 만들기
      let d = new Date(2025, 4, 29, 19, 20, 0);
      console.log(d);

      // 3. get() 함수
      let year = now.getFullYear();
      let month = now.getMonth();
      let date = now.getDate();
      let dayName = now.getDay();
      let hour = now.getHours();
      let minute = now.getMinutes();
      let second = now.getSeconds();
      let millisec = now.getMilliseconds();

      let dayNameArr = [
        "일요일",
        "월요일",
        "화요일",
        "수요일",
        "목요일",
        "금요일",
        "토요일",
      ];

      console.log(
        year,
        month + 1,
        date,
        dayNameArr[dayName],
        hour,
        minute,
        second,
        millisec,
      );

      // 4. 오늘 날짜를 yyyy-mm-dd 형식으로 만들기
      let today =
        year +
        "-" +
        (month + 1).toString().padStart(2, "0") +
        "-" +
        date.toString().padStart(2, "0");

      // 오늘 날짜 출력
      document.getElementById("endDdate").value = today;

      // ************************************************************

      // 기준시(1970-01-01)
      let standard = new Date(0);
      console.log(standard);

      // 현재 시간을 밀리초로 변환
      let todayMillisec = now.getTime();
      console.log(todayMillisec);

      // 하루 = 24시간 × 60분 × 60초 × 1000ms
      let dayMillisec = 24 * 60 * 60 * 1000;
      console.log(dayMillisec);

      // 어제
      let yesterday = new Date(todayMillisec - dayMillisec);
      console.log(yesterday);

      // 오늘 기준 1주일 전
      let sevenAgo = new Date(todayMillisec - dayMillisec * 7);
      year = sevenAgo.getFullYear();
      month = sevenAgo.getMonth();
      date = sevenAgo.getDate();

      sevenAgo =
        year +
        "-" +
        (month + 1).toString().padStart(2, "0") +
        "-" +
        date.toString().padStart(2, "0");
      document.getElementById("startDate").value = sevenAgo;

      // 오늘 기준으로 며칠 전 (-n)후(n)를 구하는 함수 :getIntervalDate()

      console.log(`3일 전 : ${getIntervalDate(-3)}`);
      console.log(`7일 전 : ${getIntervalDate(-7)}`);
      console.log(`30일 후 : ${getIntervalDate(30)}`);
      console.log(`3일 후 : ${getIntervalDate(3)}`);

      //8. 내가 원하는 포맷으로 오늘 기준으로 며칠 전 (-n)후(n)를 구하는 함수
      const getIntervalDateFormat = (day, format) => {
        let today = new Date();
        let dayMillisec = 24 * 60 * 60 * 1000;
        let IntervalDay = now.getTime() + day * dayMillisec;
        return new Date(IntervalDay);

        let text = [];
        for (let formatting of format) {
          if (formatting === "YYYY") {
            year +
              "-" +
              (month + 1).toString().padStart(2, "0") +
              "-" +
              date.toString().padStart(2, "0");
          } else if (formatting === "YY") {
            year.toString().slice(0, 2) +
              (month + 2).toString().padStart(2, "0") +
              "-" +
              date.toString().padStart(2, "0");
          }
        }
      };
      console.log("확인" + getIntervalDateFormat(-3, "YYYY-MM-DD")); // 2026-06-28
      console.log(getIntervalDateFormat(3, "YY-MM-DD")); // 2026-06-24
