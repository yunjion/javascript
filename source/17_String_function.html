<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    let str = "Welcome Seoul";
    //1. property : lengh
    console.log(str.length);
        
    //2. indexOf(대상 문자열, 검색 시작위치) : 문자열을 찾아서 인덱스를 리턴해준다 
    console.log(str.indexOf("Seoul"));
    str = "Welcome Seoul Seoul"; //찾고자 하는 문자열을 처음 하나만 찾는다 
    console.log(str.indexOf("Seoul",10));
    // -1 : 없는 글자
    console.log(str.indexOf("Jeju")); // 콘솔에 -1 나옴

    //숙제
   //활용 과제 : 전화번호 입력시 - 있으면 : 오류
      let tel = "010-0000-0000"; //indexof 없으면 -1반환 하이픈이 있으면 -1반환 없으면 0이상 반환
      if (tel.indexOf("-") === -1) {
        console.log(tel);
      } else {
        console.log("오류입니다");
      }
    </script>
   
</body>
</html>
