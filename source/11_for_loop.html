<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /* for(statement : statement2 :statement3);
        statement 1 : 코드 블록을 실행하기 전에 무조건 한 번 실행하는 초기화 문장
        statement 2 : 코드 블록을 실행시킬 조건절
        statement 3 : 코드 블록을 실행한 후 실행되는 횟수 증감 코드 

        st1 => st2? true => 구문 => st3 => st2? true => 구문 
        */
       let brands = ["애플","구글","아마존","마이크로소프트","메타"];
        const sizeBrands = brands.length;
       for(let i = 0; i < sizeBrands; i++) {
        console.log(brands[i]);
       }
       //for 문을 이용하여 자판기에서 구입 가능한 음료를 구하기 
       
       console.log(" ");

       const drinkList = [
        {name: "오렌지", price: 1000},
        {name: "파워 에이드", price: 1200},
        {name: "커피", price: 700},
        {name: "보리음료", price: 1200},
        {name: "코카콜라", price: 1800},
       ];

       let inPutCoin = 1000;
       for(let j =0; j < drinkList.length; j++) {
        if(inPutCoin >= drinkList[j].price) {
            console.log(drinkList[j].name);
        }
    }
        console.log(" ");

        let avaliableDrink = []; //구입 가능한 음료 저장하는 배열
        for(let c = 0; c  < drinkList.length; c++) {
            let drink = drinkList[c]; //음료수 객체가 저장되는 변수 
           if(inPutCoin >= drink.price) {
                avaliableDrink.push(drink.name);
        
           }
        }
        console.log("구입 가능 음료 :" , avaliableDrink);
       //break : 조건문이나 반복문을 종료
        for(let d = 0; d < 10; d++) {
            if(d === 5) {
                break;
            }
            else {
                console.log(d);
            }
        }
       //continue : 해당 단계는 건거고 다음 step 으로 
       for(let d = 0; d < 10; d++) {
            if(d === 5) {
                continue;
            }
            else {
                console.log(d);
            }
        }
    
    </script>
</body>
</html>
