<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for="n1">숫자1</label><input type="number" id="n1"/> <br />
    <label for="n2">숫자2</label><input type="number" id="n2"/> 
    <button onclick="doSum()">계산</button>
    <p>결과 : <span id="result"></span></p>
    <script>
        const doSum = () => {
            let number1 = parseInt(document.getElementById("n1").value);
            let number2 = parseInt(document.getElementById("n2").value);
            let sum = number1 + number2;
            //console.log(sum);
            document.getElementById("result").innerHTML= sum;
        };
        
        //Number 
        let num = 23432;
        console.log(num); //파란색 숫자
         
        //1. toString() : 숫자를 문자열로 
        let strNum = num.toString();
        console.log(strNum); //검정색 문자열

        //2. 문자열을 정수로 : parseInt() =>  전역함수(주인 = window)
       // window.parseInt(strNum); //window 생략 가능
        console.log(parseInt(strNum)); 
        
        num = 123.45;
        //3. 문자열을 실수로 : parseFloat() => 전역함수(주인 = window)
        console.log(parseFloat(num));

        let num2 = parseFloat(num);
        console.log(num2.toFixed(1)); //123.5 => 둘째자리에서 반올림
        //4. 소수점 이하 자리 표현 방법 : toFixed() 
        num2 = 10.4567;
       
        console.log(num2.toFixed(0)); //정수만 나옴,문자열 형태로 나옴 ,10 
        console.log(num2.toFixed(1)); //10.5
        console.log(num2.toFixed(2)); //10.46
        console.log(num2.toFixed(3)); //10.457
        console.log(num2.toFixed(8)); //10.45670000

        // console.log(num2.toPrecision(0)); == RangeError: toPrecision() argument must be between 1 and 100 at Number.toPrecision
        console.log(num2.toPrecision(1)); //1e+1 지수표현방식
        console.log(num2.toPrecision(2)); //10
        console.log(num2.toPrecision(3)); //10.5
        console.log(num2.toPrecision(8)); //10.456700

        //6. 지수표현방식 : toExponential() 
        console.log(num2.toExponential());





        

        /* 자바스크립트의 전역함수 
        1.특정 클래스 내부나 객체내에 정의되지 않고 스크립트 전체 어디에서나 직접 호출이 가능한 함수를 의미한다
        2.브라우저 환경에서는 window에 node.js 환경에서는 global객체에 소속 되어 있다.
        3.실무에서 많이 사용하는 주요 전역함수
        1.evail() : 문자열로 된 스크립트 코드 실행
        2/isFinite() : 값이 유효한 숫자인지 확인
        3.isNan() : 값이 not a number 인지 확인
        4.parseFloat() : 문자열을 실수로 바꿈
        5.parseInt() : 문자열을 정수로 바꿈
        */



    </script>
</body>
</html>
