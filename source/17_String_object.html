<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
      //4. ***slice(시작위치, 종료위치) : 문자열의 시작위치에서 종료위치 -1 까지 잘라내기
      //매개변수에 음수가 올 수 있다.
      //유연하다.
       let str = "Welcome Seoul"; 
      console.log(str.slice(8, 13)); //Seoul
      console.log(str.slice(8)); //Seoul
      console.log(str.slice(0)); //Welcome Seoul 0부터 끝까지
      //서울의 위치를 몰라 컴퓨터에게 찾아내라고함
      console.log(str.slice(str.indexOf("Seoul")));

      //str = "Welcome Seoul";
      //              -5-4-3-2-1
      console.log(str.slice(-5)); //뒤에서부터 5번째부터 끝까지 잘라내라는말   Seoul
      console.log(str.slice(-8, -3)); //me Se -8~ -4
    
      //5.substring(시작위치, 종료위치) : 문자열의 시작위치에서 종료위치 -1까지 잘라내기
      //매개변수에 음수가 나오면 0으로 간주
      //오동작 가능성 => 오류가 발생 X
      console.log(str.substring(8, 13)); //Seoul
      console.log(str.substring(8)); //Seoul
      console.log(str.substring(0)); //Welcome Seoul
      console.log(str.substring(-5)); //0 => Welcome Seoul
      console.log(str.substring(-8, -3)); // X(blank)

      //6. substr(시작 위치, 잘라낼 길이) : 문자열을 길이만큼 잘라내기
      //명확하게 잘라낼 길이를 알 경우 유용함
      let studentNumber = "2318";
      let grade = studentNumber.substr(0, 1); //0번째부터 1개 잘라냄
      let classN = studentNumber.substr(1, 1); //반 1번부터 1개 잘라냄
      let number = studentNumber.substr(2, 2); //2번째부터 2개
      console.log(grade, "학년", classN, "반", number, "번");

      //slice와 유사한 함수 : substring, substr => why???
      //왜 유사한 함수를 많이 만들어 두었을까? 생각해보자
      // ***** slice vs substring vs substr
      /* slice : 가장 유연하고 현대적이니 메서드, 음수처리가 가능
         substring : slice와 유사하지만 인덱스가 음수인 경우 처리가 다르다
         substr : 인덱스가 아닌 글자 수를 기준으로 하지만 현재 웹표준으로 권장하지 않는다. */
         

     //7. replace(문자열1, 문자열2) : 문자열1을 문자열2로 교체하는 함수
     str = "Welcome Jeju! Jeju";
     console.log(str.replace("Jeju","Seoul")); 

     //과제 => replaceAll 사용하지 말고 Jeju를 서울로 바꾸기 
     str = "Welcome Jeju! Jeju";
        while (str.indexOf("Jeju") !== -1) {
        str = str.replace("Jeju", "Seoul");
        }

        console.log(str);
     //8. ** toUpperCase() : 대문자로 변환
     //9. ** toLoweCase() : 소문자로 변환 
     //exam : 제품 번호 포맷 : 영어대문자 제조년월일 코드  =>  M260422DEF 
     //m260422DEF m260422def 사용자가 이렇게 입력 받는다면 이런걸 바꿀때 사용

     console.log(str.toUpperCase());
     console.log(str.toLowerCase());

     //10. concat 문자열 합치기, 문자열의 갯수는 제한이 없다 
     let firstName = "John";
     let lastName = "Doe";
     let fullName = firstName.concat(",",lastName,"!~~","Welcome");
     console.log(fullName);

     //11. trim() : 문자열 앞, 뒤 공백을 없애기 
     let name = "           에이스???2학년        3반";

     console.log(name.trim()); //사이 공백은 자르지 않고 양 끝에 공백만 자른다

     //12. *****padStart(문자열 전체 길이, 앞에 채울 문자열) 
     //현업에서 가장 많이 사용하고 중요하다. => 동일한 내용을 자바스크립트코드로 작성하면 매우 길다.
     //월을 2자리로 출력 ㅌ
    //let today = new Date();
    //let month = today.getMonth() + 1;

    // if (month < 10) {
    // console.log("0" + month + "월");
    // } else {
    // console.log(month + "월");
    // }
    //padStart 사용 
    let today = new Date();
    let month = today.getMonth() + 1;

    let result1 = String(month).padStart(2, "0");
    console.log(result1 + "월");
    //  (+month).length < 2
    
    //13. padEnd(문자열 전체 길이, 뒤에 채울 문자열)
    let stN = "2318";
    //학생일 경우 한번 뒤에 "s"를 붙이자
    console.log(stN.padEnd(5,"s"));
    
    //14.***charAt(인덱스) : 인덱스에 해당하는 한 글자만 가져온다 
     stN = "s2318";
     if(stN.charAt(0).toLowerCase() === "s") {
        console.log("학생입니다");
     }

     //15.  charCodeAt(인덱스) : 안덱스에 해당하는 글자의 유니코드를 리턴
    stN = "A";
    console.log(stN.charCodeAt(0));

    stN = "가힣";
    console.log(stN.charCodeAt(0));
    console.log(stN.charCodeAt(1));


    //16. *********************** split() 파라미터로 전달받은 문자열을 기준으로 문자열을 쪼갠다.
    //결과는 배열로 반환된다. 현업에서 가장 많이 사용하고 중요하다 
    //데이터 전송시 문자열(json)전송
    let jsonEx = "john@gmail.com, lee@gmail.com, kim@hanmail.com";
    let result = jsonEx.split(",");
    console.log(result);

    //17. ***startsWith() : 파라미터로 시작하는지 여부를 boolean으로 리턴 
    //https:// 여부에 따라 유효한지 여부를 출력 
    let url = "website.com";
    
    if(url === url.startsWith("https://")){
        console.log("유효");
    }else{
        console.log("유효하지 않음");
    }
    //18. ***endWith() : 파라미터로 끝나는지 여부를 boolean으로 리턴 
    console.log(url.endsWith("com")); //true
        if(url.endsWith("com")) {
        console.log("회사입니다");
    }

    
     </script>
</body>
