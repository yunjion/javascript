<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let str = "Welcome Seoul";
      //1.property : length
      console.log(str.length);

      //2. indexOf(대상 문자열, 검색 시작 위치) : 문자열을 찾아서 그 문자열의 인덱스를 리턴해줌 첫 하나만 => 정규식

      console.log(str.indexOf("Seoul")); //8

      str = "Welcome Seoul Seoul";
      console.log(str.indexOf("Seoul")); //찾고자 하는 문자열을 처음 하나만 찾고 못찾음 - 8 시작위치
      console.log(str.indexOf("Seoul", 10)); //14     8보다 높은 숫자
      console.log(str.indexOf("Jeju")); // -1

      //활용 과제 : 전화번호 입력시 - 있으면 : 오류
      let tel = "010-0000-0000"; //indexof 없으면 -1반환 하이픈이 있으면 -1반환 없으면 0이상 반환
      if (tel.indexOf("-") === -1) {
        console.log(tel);
      } else {
        console.log("오류입니다");
      }

      //3. lastIndexOf : 뒤에서부터 문자열을 찾아 (처음 만나는 것만) 인덱스를 리턴
      str = "Welcome Seoul";
      console.log(str.lastIndexOf("l")); //12

      //4. ***slice(시작위치, 종료위치) : 문자열의 시작위치에서 종료위치 -1 까지 잘라내기
      //매개변수에 음수가 올 수 있다.
      //유연하다.
      console.log(str.slice(8, 13)); //Seoul
      console.log(str.slice(8)); //Seoul
      console.log(str.slice(0)); //Welcome Seoul 0부터 끝까지
      //서울의 위치를 몰라 컴퓨터에게 찾아내라고함
      console.log(str.slice(str.indexOf("Seoul")));

      //str = "Welcome Seoul";
      //              -5-4-3-2-1
      console.log(str.slice(-5)); //뒤에서부터 5번째부터 끝까지 잘라내라는말   Seoul
      console.log(str.slice(-8, -3)); //me Se -8~ -4

      //5.substring(시작위치, 종료위치) : 문자열의 시작위치에서 종료위치 -1까지 잘라내기
      //매개변수에 음수가 나오면 0으로 간주
      //오동작 가능성 => 오류가 발생 X
      console.log(str.substring(8, 13)); //Seoul
      console.log(str.substring(8)); //Seoul
      console.log(str.substring(0)); //Welcome Seoul
      console.log(str.substring(-5)); //0 => Welcome Seoul
      console.log(str.substring(-8, -3)); // X(blank)

      //6. substr(시작 위치, 잘라낼 길이) : 문자열을 길이만큼 잘라내기
      //명확하게 잘라낼 길이를 알 경우 유용함
      let studentNumber = "2318";
      let grade = studentNumber.substr(0, 1); //0번째부터 1개 잘라냄
      let classN = studentNumber.substr(1, 1); //반 1번부터 1개 잘라냄
      let number = studentNumber.substr(2, 2); //2번째부터 2개
      console.log(grade, "학년", classN, "반", number, "번");

      //slice와 유사한 함수 : substring, substr => why???
      //왜 유사한 함수를 많이 만들어 두었을까? 생각해보자
      // ***** slice vs substring vs substr
      /* slice : 가장 유연하고 현대적이니 메서드, 음수처리가 가능
         substring : slice와 유사하지만 인덱스가 음수인 경우 처리가 다르다
         substr : 인덱스가 아닌 글자 수를 기준으로 하지만 현재 웹표준으로 권장하지 않는다. */
         
         //7. replace(문자열1, 문자열2) : 문자열1을 문자열2로 교체하는 함수
    </script>
</body>
</html>
