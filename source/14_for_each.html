<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script> 
    /* for each
     -배열에서 많이 사용
     - 매개변수로 함수를 이용한다 
     -배열.foreach(function(매개변수...,배열의 인데스){})  */


      let brands = ["애플","구글","아마존","마이크로소프트","메타"];
      brands.forEach(function (brands) {
        console.log(brands);
      });

      brands.forEach(function (brand,index) {
        console.log(index, brand);
      }); 

      let myScores = [100,98,77,90,78,88];
        let total = 0;
        myScores.forEach(function(score) {
            total += score;
            
        });
         console.log("총점 : ",total, "평균 :",total/myScores.length);

         myScores.forEach((score)=> {
            total += score;
    
         });
        
      //활용 

      </script>
    
   

     
     
</body>
</html>
