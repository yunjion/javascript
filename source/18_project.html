<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>미림 카페 주문 관리</title>
  <link rel="stylesheet" href="./css/18_project.css" />
</head>
<body>
  <main class="page">
    <section class="container">
      <header class="header">ㄴ
        <span class="eyebrow">Simple Cafe</span>
        <h1>미림 카페 주문 관리</h1>
        <p class="lead">메뉴 선택과 수량만 입력하면 주문 내역과 총 금액이 바로 보입니다.</p>
      </header>

      <section class="layout simple-layout">
        <article class="panel">
          <h2>메뉴 선택</h2>
          <div class="row">
            <div style="flex:1; min-width: 220px;">
              <label for="menuSelect">메뉴</label>
              <select id="menuSelect"></select>
            </div>
            <div style="width: 120px;">
              <label for="qtyInput">수량</label>
              <input id="qtyInput" type="number" min="1" value="1" />
            </div>
            <button type="button" onclick="addOrder()">주문 추가</button>
          </div>

          <h2 style="margin-top: 16px;">메뉴 검색</h2>
          <div class="row">
            <input id="searchInput" type="text" placeholder="메뉴명을 입력하세요" style="flex:1; min-width: 220px;" />
            <button type="button" onclick="searchMenu()">검색</button>
          </div>
          <div id="searchResult" class="search-result">검색 결과가 여기에 표시됩니다.</div>
        </article>

        <article class="panel">
          <h2>주문 내역</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>주문번호</th>
                  <th>메뉴명</th>
                  <th>단가</th>
                  <th>수량</th>
                  <th>금액</th>
                </tr>
              </thead>
              <tbody id="orderBody"></tbody>
            </table>
          </div>

          <div class="summary">
            <strong>총 주문 수량 : <span id="totalQty">0개</span></strong>
            <strong>총 결제 금액 : <span id="totalAmount">0원</span></strong>
          </div>
        </article>
      </section>
    </section>
  </main>

  <script src="./js/18_project.js"></script>
</body>
</html>
