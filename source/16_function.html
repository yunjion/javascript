    <script>
        /* 1. 함수 선언식 방식 
        - function 함수 이름(매개변수 .....) {
            //코드 부분 
            // (return) 있을 수도 있고 없을 수도 있다
        }
        -선언전 호출이 가능]
        -이유? js는 브라우저에서 동작하는 것과 Node.js로 동작하는 것이 있다 
        브라우저동작 = 동작하는 것은 브라우저 엔진으로 동작 시킨다
                     코드 순서대로 동작
                     브라우저가 마음대로 정하는 것
                     1. 선언 함수
                     2. 전역 변수 이 두개를 제일 먼저 메모리에 갖다 두고 그 후에 나머지를 동작 시킨다 
         */

        console.log(sum(9,8));

        function sum(n1,n2) {
            return n1 + n2;
        }

        function taxAmount(productPrice) {
            let tax = 0.1;
            return tax * productPrice;
        }

        console.log(taxAmount(14500));

        /* 변수 사용과 비슷한 방식으로 변수에 함수를 할당해서 사용
        변수 명이 함수명 처럼 사용된다 
        선언전에 사용이 불가능하다 
        */
        const sum2 = function(n1,n2) {
            return n1 + n2;
        };

        console.log(sum2(6,7));

        /*변수 score????
        1.매개변수
        2.
        :
        var 변수1    -> 전체 
            function() {
                var변수? -> 함수안에 전체 함수 안에서 선언하는 것은 안 좋음 
                } */

        /* 3. 화살표 함수
        -function 예약어 사용 안 함 
        -(매개변수) => { }
        -return문이 있고 실행문이 한 줄인 경우 {} 생략 가능  
         */

         const sum3 = (n1,n2) => n1+n2;

         console.log(sum3(4,5));

         //과제 더할 숫자 2개, 연사자를 입력받아 연산을 실행하는 함수를 작성해보자 
         function calc(a, b, op) {
            switch(op) {
                case '+':
                    return a + b;
                case '-':
                    return a - b;
                case '*':
                    return a * b;
                case '/':
                    if (b === 0) {
                        return "0으로 나눌 수 없음";
                    }
                    return a / b;
                default:
                    return "잘못된 연산자";
            }
        }
        function runCalc() {
            let a = Number(prompt("첫 번째 숫자 입력:"));
            let b = Number(prompt("두 번째 숫자 입력:"));
            let op = prompt("연산자 입력 (+, -, *, /):");

            let result = calc(a, b, op);

            console.log("결과:", result);
            alert("결과: " + result);
            
        }
        runCalc();
        
        //4. function() 생성자 함수
       let op = "+";
       const cal3 = new Function("n1,n2", "return n1" + op + "n2");
       console.log(cal3(11, 22));
    </script>
